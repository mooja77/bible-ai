name: Platform smoke builds

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-e2e:
    name: Windows WebView E2E
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            app/sidecar/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - uses: actions/cache@v4
        with:
          path: data/sources
          key: corpus-sources-${{ hashFiles('data/corpus-lock.json') }}

      - name: Install dependencies and Tauri WebDriver bridge
        shell: pwsh
        run: |
          npm ci
          npm ci --prefix sidecar
          cargo install tauri-driver --version 2.0.6 --locked

      - name: Build the deterministic non-embedding E2E corpus
        working-directory: .
        run: |
          python scripts/build_corpus.py --restart --stop-after ingest_strongs
          Copy-Item -LiteralPath data/.corpus.sqlite.building -Destination data/corpus.sqlite

      - name: Prepare bundled sidecar runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force sidecar/node | Out-Null
          Copy-Item -LiteralPath (Get-Command node).Source -Destination sidecar/node/node.exe

      - name: Build and run the WebView suite
        run: npm run test:e2e:build

  macos-bundle:
    name: macOS ad-hoc bundle smoke
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: app
    env:
      # A CI smoke signature proves bundle construction only. Public releases
      # still require the protected Developer ID and notarization workflow.
      APPLE_SIGNING_IDENTITY: "-"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            app/sidecar/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install app dependencies
        run: npm ci

      - name: Prepare native sidecar and placeholder corpus
        shell: bash
        run: |
          if [[ ! -f ../data/corpus.sqlite ]]; then
            touch ../data/corpus.sqlite
          fi
          npm run macos:sidecar:prepare
          npm run macos:build-env:verify

      - name: Build macOS app bundle
        run: npm run tauri -- build --debug --bundles app

      - name: Verify bundle resources
        shell: bash
        run: |
          bundle="$(find src-tauri/target/debug/bundle/macos -maxdepth 1 -name '*.app' -type d -print -quit)"
          test -n "$bundle"
          test -x "$bundle/Contents/MacOS/app"
          test -f "$bundle/Contents/Resources/corpus.sqlite"
          test -x "$bundle/Contents/Resources/sidecar/node/bin/node"
          test -f "$bundle/Contents/Resources/sidecar/index.mjs"
